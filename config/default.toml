[discord]
# トークンは.envファイルから読み込みます
# ここには何も設定しません

[rss]
feed_url = "https://b.hatena.ne.jp/t/ai?mode=rss"
poll_interval_seconds = 60  # 5分ごとにチェック

[hatena]
thresholds = [1, 2, 3]
count_api_timeout_seconds = 10
candidate_retention_days = 7

[[notification.channels]]
threshold = 1
channel_id = "1500886133343522999"

[[notification.channels]]
threshold = 2
channel_id = "1500883811838333039"

[[notification.channels]]
threshold = 3
channel_id = "1500883839298441349"

[state]
file_path = "data/articles.json"
skip_existing_on_first_run = true
